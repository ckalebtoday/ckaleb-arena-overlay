<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arena Code Overlay</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      height: 100vh;
      padding: 20px;
      font-family: 'Exo 2', sans-serif;
    }

    #overlay {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(5, 5, 30, 0.75);
      border: 2px solid rgba(160, 80, 255, 0.6);
      border-radius: 10px;
      padding: 12px 22px;
      backdrop-filter: blur(6px);
      box-shadow:
        0 0 12px rgba(160, 80, 255, 0.5),
        0 0 30px rgba(100, 200, 255, 0.15),
        inset 0 0 10px rgba(160, 80, 255, 0.08);
      transition: opacity 0.4s ease;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .label {
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #a855f7;
      text-shadow:
        0 0 8px #a855f7,
        0 0 20px #7c3aed;
    }

    .code {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #ffffff;
      text-shadow:
        0 0 6px #ffffff,
        0 0 14px #c4b5fd,
        0 0 28px #a855f7,
        -2px 0 0 #06b6d4;
    }

    /* Admin panel — hidden from stream view */
    #admin {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(10, 10, 40, 0.9);
      border: 1px solid #a855f7;
      border-radius: 8px;
      padding: 14px 18px;
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 999;
    }

    #admin input {
      background: rgba(255,255,255,0.08);
      border: 1px solid #a855f7;
      border-radius: 6px;
      color: #fff;
      font-family: 'Exo 2', sans-serif;
      font-size: 14px;
      padding: 6px 12px;
      outline: none;
      width: 140px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #admin input::placeholder { color: rgba(255,255,255,0.3); }

    #admin button {
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: 'Exo 2', sans-serif;
      font-weight: 700;
      font-size: 13px;
      padding: 7px 14px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: opacity 0.2s;
    }

    #admin button:hover { opacity: 0.8; }

    #clearBtn {
      background: rgba(255, 80, 120, 0.7) !important;
    }
  </style>
</head>
<body>

  <!-- Stream Overlay -->
  <div id="overlay" class="hidden">
    <span class="label">Arena Code</span>
    <span class="code" id="displayCode"></span>
  </div>

  <!-- Admin Control Panel (crop this out in OBS or hide via URL param) -->
  <div id="admin">
    <input type="text" id="codeInput" placeholder="Enter Code" maxlength="10" />
    <button onclick="setCode()">Set</button>
    <button id="clearBtn" onclick="clearCode()">Clear</button>
  </div>

  <script>
    function setCode() {
      const val = document.getElementById('codeInput').value.trim().toUpperCase();
      if (!val) return;
      document.getElementById('displayCode').textContent = val;
      document.getElementById('overlay').classList.remove('hidden');
    }

    function clearCode() {
      document.getElementById('displayCode').textContent = '';
      document.getElementById('overlay').classList.add('hidden');
      document.getElementById('codeInput').value = '';
    }

    document.getElementById('codeInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') setCode();
    });
  </script>

</body>
</html>
