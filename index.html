<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Arena Code Overlay</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      height: 100vh;
      padding: 20px;
      font-family: 'Exo 2', sans-serif;
    }

    #overlay {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(5, 5, 30, 0.75);
      border: 2px solid rgba(160, 80, 255, 0.6);
      border-radius: 10px;
      padding: 12px 22px;
      backdrop-filter: blur(6px);
      box-shadow:
        0 0 12px rgba(160, 80, 255, 0.5),
        0 0 30px rgba(100, 200, 255, 0.15),
        inset 0 0 10px rgba(160, 80, 255, 0.08);
      transition: opacity 0.4s ease;
    }

    #overlay.hidden { opacity: 0; pointer-events: none; }

    .label {
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #a855f7;
      text-shadow: 0 0 8px #a855f7, 0 0 20px #7c3aed;
    }

    .code {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #ffffff;
      text-shadow:
        0 0 6px #ffffff,
        0 0 14px #c4b5fd,
        0 0 28px #a855f7,
        -2px 0 0 #06b6d4;
    }
  </style>
</head>
<body>
  <div id="overlay" class="hidden">
    <span class="label">Arena Code</span>
    <span class="code" id="displayCode"></span>
  </div>

  <script>
    const BIN_ID = '6a2ec420f5f4af5e29f09ff3';
    const API_KEY = '$2a$10$TWKGFi8gk9KQmP5he6cfNuxZR1hlQghxikWHUBKAkKw1RIMY5YR9.';

    function fetchCode() {
      fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
        headers: { 'X-Master-Key': API_KEY }
      })
      .then(r => r.json())
      .then(data => {
        const code = data.record.code;
        const overlay = document.getElementById('overlay');
        const el = document.getElementById('displayCode');
        if (code) {
          el.textContent = code;
          overlay.classList.remove('hidden');
        } else {
          el.textContent = '';
          overlay.classList.add('hidden');
        }
      });
    }

    fetchCode();
    setInterval(fetchCode, 2000);
  </script>
</body>
</html>
